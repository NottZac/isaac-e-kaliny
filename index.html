<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
  import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCfmTmB3VgB2dLo_9ASR8eXj7u0ZuMQ_So",
    authDomain: "isaac-e-kaliny.firebaseapp.com",
    projectId: "isaac-e-kaliny",
    storageBucket: "isaac-e-kaliny.firebasestorage.app",
    messagingSenderId: "734318052808",
    appId: "1:734318052808:web:6850d7b2d632e7333c2cfd",
    databaseURL: "https://isaac-e-kaliny-default-rtdb.firebaseio.com"
  };

  let allTasks = [];

  function fireDemo() {
    allTasks = [
      {id:'1',title:'Redesign da Interface',description:'Atualizar componentes visuais do sistema',category:'design',priority:'alta',status:'em_progresso',dueDate:'2025-05-10',createdAt:Date.now()-86400000*3,progress:65},
      {id:'2',title:'API de Autenticação',description:'OAuth 2.0 com refresh tokens',category:'dev',priority:'alta',status:'pendente',dueDate:'2025-05-12',createdAt:Date.now()-86400000*2,progress:0},
      {id:'3',title:'Testes Unitários',description:'Cobertura de 80% nos módulos principais',category:'dev',priority:'media',status:'concluida',dueDate:'2025-05-05',createdAt:Date.now()-86400000*5,progress:100},
      {id:'4',title:'Documentação Técnica',description:'Escrever docs para nova API REST',category:'docs',priority:'baixa',status:'pendente',dueDate:'2025-05-20',createdAt:Date.now()-86400000*1,progress:20},
      {id:'5',title:'Deploy no Servidor',description:'CI/CD pipeline com Docker',category:'dev',priority:'alta',status:'em_progresso',dueDate:'2025-05-08',createdAt:Date.now()-86400000*4,progress:40},
      {id:'6',title:'Pesquisa de Usuários',description:'10 entrevistas com usuários finais',category:'design',priority:'media',status:'concluida',dueDate:'2025-05-03',createdAt:Date.now()-86400000*7,progress:100},
      {id:'7',title:'Otimização de Banco',description:'Indexar queries lentas no PostgreSQL',category:'dev',priority:'media',status:'pendente',dueDate:'2025-05-15',createdAt:Date.now()-86400000*1,progress:0},
      {id:'8',title:'Newsletter Mensal',description:'Email marketing e design',category:'marketing',priority:'baixa',status:'em_progresso',dueDate:'2025-05-30',createdAt:Date.now()-86400000*2,progress:50},
    ];
    window._addTask = t => { allTasks.push({...t,id:'d'+Date.now(),createdAt:Date.now(),progress:0}); fire(); };
    window._deleteTask = id => { allTasks=allTasks.filter(t=>t.id!==id); fire(); };
    window._updateTask = (id,u) => { allTasks=allTasks.map(t=>t.id===id?{...t,...u}:t); fire(); };
    const pill = document.getElementById('demo-pill');
    if (pill) pill.style.display='inline-block';
    fire();
  }

  function fire() { if (window._onTasksUpdate) window._onTasksUpdate(allTasks); }

  try {
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const tRef = ref(db, 'tasks');

    onValue(tRef, snap => {
      allTasks = [];
      snap.forEach(c => allTasks.push({id: c.key, ...c.val()}));
      fire();
    }, err => {
      console.warn('Firebase error, usando demo:', err);
      fireDemo();
    });

    window._addTask = t => push(tRef, {...t, createdAt: Date.now(), progress: 0});
    window._deleteTask = id => remove(ref(db, 'tasks/' + id));
    window._updateTask = (id, u) => update(ref(db, 'tasks/' + id), u);
  } catch(e) {
    console.warn('Firebase init failed, usando demo:', e);
    fireDemo();
  }

  window._getTasks = () => allTasks;
</script>

<div class="grain"></div>

<div class="app">
  <aside class="sb">
    <div class="logo">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" width="13" height="13"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
      </div>
      Taskhive
    </div>

    <span class="nl">Principal</span>
    <div class="ni on" id="nav-dashboard" onclick="setView('dashboard')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
      Dashboard
    </div>
    <div class="ni" id="nav-tasks" onclick="setView('tasks')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
      Tarefas
      <span class="nbadge" id="nbadge">0</span>
    </div>
    <div class="ni" id="nav-kanban" onclick="setView('kanban')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="5" height="18" rx="1"/><rect x="10" y="3" width="5" height="12" rx="1"/><rect x="17" y="3" width="5" height="15" rx="1"/></svg>
      Kanban
    </div>

    <span class="nl">Filtrar por</span>
    <div class="ni" onclick="filterCat('dev')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="color:var(--blu)"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
      Dev
    </div>
    <div class="ni" onclick="filterCat('design')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="color:var(--pur)"><circle cx="12" cy="12" r="10"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>
      Design
    </div>
    <div class="ni" onclick="filterCat('docs')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="color:var(--grn)"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      Docs
    </div>
    <div class="ni" onclick="filterCat('marketing')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="color:var(--yel)"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
      Marketing
    </div>

    <div class="sf">
      <div class="urow"><div class="av">U</div><div><div class="un">Usuário</div><div class="us">Admin</div></div></div>
    </div>
  </aside>

  <div class="mn">
    <div class="tb">
      <div class="ptitle" id="ptitle">Dashboard</div>
      <span class="demo-pill" id="demo-pill">DEMO</span>

      <div class="srch">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" placeholder="Buscar..." id="sinput" oninput="onSearch()">
      </div>

      <div class="tpicker" title="Tema de cor">
        <div class="td td-pk on" onclick="setTheme('pink',this)" title="Rosa"></div>
        <div class="td td-gn"    onclick="setTheme('green',this)" title="Verde"></div>
        <div class="td td-bl"    onclick="setTheme('blue',this)"  title="Azul"></div>
        <div class="td td-bk"    onclick="setTheme('black',this)" title="Preto Blur"></div>
      </div>

      <div class="vtabs">
        <button class="vt on" id="vt-l" onclick="setTV('list')">Lista</button>
        <button class="vt" id="vt-g" onclick="setTV('grid')">Grade</button>
      </div>
      <button class="btn btn-p" onclick="openM()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Nova Tarefa
      </button>
    </div>

    <div class="bwrap">
      <div class="content fade" id="content">

        <div class="view act" id="view-dashboard">
          <div class="srow" id="srow"></div>
          <div class="g3">
            <div class="card">
              <div class="ch">
                <span class="ct">Progresso Semanal</span>
                <div class="vtabs" style="gap:3px">
                  <button class="vt on" id="ctb" onclick="swC('bar')" style="padding:3px 8px;font-size:10px">Barras</button>
                  <button class="vt" id="ctl" onclick="swC('line')" style="padding:3px 8px;font-size:10px">Linha</button>
                </div>
              </div>
              <div style="position:relative;height:185px"><canvas id="cMain"></canvas></div>
            </div>
            <div class="card">
              <div class="ch"><span class="ct">Distribuição</span></div>
              <div class="ring-wrap" style="margin-bottom:10px">
                <svg viewBox="0 0 80 80" width="80" height="80">
                  <circle class="rb" cx="40" cy="40" r="34" transform="rotate(-90 40 40)"/>
                  <circle class="rf" id="rfg" cx="40" cy="40" r="34" transform="rotate(-90 40 40)" stroke-dashoffset="110"/>
                </svg>
                <div class="rlbl"><span class="rpct" id="rpct">0%</span><span class="rsub">feitas</span></div>
              </div>
              <div style="position:relative;height:100px"><canvas id="cDon"></canvas></div>
              <div id="dleg" style="margin-top:9px;display:flex;flex-direction:column;gap:4px"></div>
            </div>
          </div>
          <div class="g2">
            <div class="card">
              <div class="ch">
                <span class="ct">Recentes</span>
                <button class="btn btn-g" onclick="setView('tasks')" style="font-size:10px;padding:4px 8px">Ver todas</button>
              </div>
              <div class="tlist" id="rlist"></div>
            </div>
            <div class="card">
              <div class="ch"><span class="ct">Atividade</span></div>
              <div class="tl" id="tllist"></div>
            </div>
          </div>
        </div>

        <div class="view" id="view-tasks">
          <div class="frow" id="frow">
            <button class="fb on" onclick="setF('all',this)">Todas</button>
            <button class="fb" onclick="setF('pendente',this)">Pendente</button>
            <button class="fb" onclick="setF('em_progresso',this)">Em Progresso</button>
            <button class="fb" onclick="setF('concluida',this)">Concluída</button>
            <span style="margin-left:auto;font-size:9px;color:var(--t3)" id="tcnt"></span>
          </div>
          <div id="tarea"></div>
          <div class="qa" onclick="openM()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Adicionar tarefa...
          </div>
        </div>

        <div class="view" id="view-kanban">
          <div class="kboard" id="kboard"></div>
        </div>
      </div>

      <div class="det" id="det">
        <div style="display:flex;align-items:center;justify-content:space-between">
          <span class="dl">Detalhe</span>
          <button onclick="closeD()" style="background:none;border:none;color:var(--t2);cursor:pointer">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><path d="M18 6L6 18M6 6l12 12"/></svg>
          </button>
        </div>
        <div id="dbody"></div>
      </div>
    </div>
  </div>
</div>

<div class="ov" id="ov" onclick="closeOv(event)">
  <div class="modal">
    <div class="mttl">Nova Tarefa</div>
    <div class="fg"><label class="fl">Título</label><input class="fi" id="ft" placeholder="Nome da tarefa..."></div>
    <div class="fg"><label class="fl">Descrição</label><textarea class="ft" id="fd" placeholder="Detalhes..."></textarea></div>
    <div class="frow2">
      <div class="fg"><label class="fl">Categoria</label>
        <select class="fs" id="fc"><option value="dev">Desenvolvimento</option><option value="design">Design</option><option value="docs">Documentação</option><option value="marketing">Marketing</option></select>
      </div>
      <div class="fg"><label class="fl">Prioridade</label>
        <select class="fs" id="fp"><option value="baixa">Baixa</option><option value="media">Média</option><option value="alta">Alta</option></select>
      </div>
    </div>
    <div class="frow2">
      <div class="fg"><label class="fl">Início</label><input class="fi" id="fst" type="date"></div>
      <div class="fg"><label class="fl">Entrega</label><input class="fi" id="fdu" type="date"></div>
    </div>
    <div class="mact">
      <button class="btn btn-g" onclick="closeM()">Cancelar</button>
      <button class="btn btn-p" onclick="subT()">Criar</button>
    </div>
  </div>
</div>

<script>
let V='dashboard',F='all',CAT=null,TV='list',CT='bar',SQ='';
let MC=null,DC=null;
const CL={dev:'Dev',design:'Design',docs:'Docs',marketing:'Marketing'};
const CLF={dev:'Desenvolvimento',design:'Design',docs:'Documentação',marketing:'Marketing'};
const PL={alta:'Alta',media:'Média',baixa:'Baixa'};
const SL={pendente:'Pendente',em_progresso:'Em Progresso',concluida:'Concluída'};
const CC=['#4f8eff','#c084fc','#22d6a0','#fbbf24'];

function setTheme(t,el){
  const m={pink:'',green:'green',blue:'blue',black:'black'};
  document.documentElement.setAttribute('data-theme',m[t]);
  document.querySelectorAll('.td').forEach(d=>d.classList.remove('on'));
  if(el)el.classList.add('on');
  setTimeout(()=>renderV(gt()),120);
}

window._onTasksUpdate=function(tasks){
  const badge=document.getElementById('nbadge');
  if(badge) badge.textContent=tasks.filter(t=>t.status==='pendente').length;
  renderV(tasks);
};
function gt(){return window._getTasks?window._getTasks():[]}
function renderV(tasks){
  renderS(tasks);
  if(V==='dashboard')renderDB(tasks);
  if(V==='tasks')renderT(tasks);
  if(V==='kanban')renderK(tasks);
}

function renderS(tasks){
  const tot=tasks.length,dn=tasks.filter(t=>t.status==='concluida').length,
        pg=tasks.filter(t=>t.status==='em_progresso').length,
        hi=tasks.filter(t=>t.priority==='alta'&&t.status!=='concluida').length;
  const srowEl=document.getElementById('srow');
  if(srowEl) srowEl.innerHTML=[
    sC('Total',tot,'tarefas',`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>`,'rgba(79,142,255,.14)','var(--blu)'),
    sC('Concluídas',dn,`${tot?Math.round(dn/tot*100):0}% do total`,`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>`,'rgba(34,214,160,.14)','var(--grn)'),
    sC('Em Progresso',pg,'ativas',`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`,'var(--as)','var(--a)'),
    sC('Alta Prior.',hi,'urgentes',`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`,'rgba(251,91,91,.14)','var(--red)'),
  ].join('');
}
function sC(l,v,s,ic,bg,col){return`<div class="sc"><div class="sl">${l}</div><div class="sv">${v}</div><div class="ss">${s}</div><div class="si" style="background:${bg};color:${col}">${ic}</div></div>`}

function renderDB(tasks){bMC(tasks);bDon(tasks);bRing(tasks);bRec(tasks);bTL(tasks);}

function accHex(){
  const t=document.documentElement.getAttribute('data-theme');
  if(t==='green')return'#16a34a';
  if(t==='blue')return'#3b82f6';
  if(t==='black')return'#d4d4d4';
  return'#ff3fa4';
}

function bMC(tasks){
  const days=['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'];
  const cr=days.map((_,i)=>tasks.filter(t=>{const d=new Date(t.createdAt||0);return d.getDay()===(i+1)%7;}).length);
  const dn=days.map((_,i)=>tasks.filter(t=>{const d=new Date(t.createdAt||0);return t.status==='concluida'&&d.getDay()===(i+1)%7;}).length);
  const a=accHex();
  const canv=document.getElementById('cMain');
  if(!canv)return;
  const ctx=canv.getContext('2d');
  if(MC)MC.destroy();
  MC=new Chart(ctx,{type:CT,data:{labels:days,datasets:[
    {label:'Criadas',data:cr,backgroundColor:a+'99',borderColor:a,borderWidth:2,borderRadius:5,tension:.45,fill:true,pointBackgroundColor:a,pointRadius:3},
    {label:'Concluídas',data:dn,backgroundColor:'#22d6a066',borderColor:'#22d6a0',borderWidth:2,borderRadius:5,tension:.45,fill:true,pointBackgroundColor:'#22d6a0',pointRadius:3}
  ]},options:{responsive:true,maintainAspectRatio:false,
    plugins:{legend:{labels:{color:'#9090a8',font:{family:'DM Sans',size:10},boxWidth:7,padding:10}}},
    scales:{x:{grid:{color:'rgba(255,255,255,.03)'},ticks:{color:'#5e4e66',font:{family:'DM Sans',size:10}}},
             y:{grid:{color:'rgba(255,255,255,.03)'},ticks:{color:'#5e4e66',font:{family:'DM Sans',size:10}},beginAtZero:true}}}});
}
function bDon(tasks){
  const cats=['dev','design','docs','marketing'];
  const counts=cats.map(c=>tasks.filter(t=>t.category===c).length);
  const canv=document.getElementById('cDon');
  if(!canv)return;
  const ctx=canv.getContext('2d');
  if(DC)DC.destroy();
  DC=new Chart(ctx,{type:'doughnut',data:{labels:cats.map(c=>CLF[c]),datasets:[{data:counts,backgroundColor:CC,borderColor:'transparent',borderWidth:0,hoverOffset:4}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'65%',plugins:{legend:{display:false}}}});
  const dleg=document.getElementById('dleg');
  if(dleg) dleg.innerHTML=cats.map((c,i)=>`
    <div style="display:flex;align-items:center;justify-content:space-between">
      <div style="display:flex;align-items:center;gap:5px"><div style="width:6px;height:6px;border-radius:50%;background:${CC[i]}"></div><span style="font-size:10px;color:var(--t2)">${CLF[c]}</span></div>
      <span style="font-size:10px;font-weight:700">${counts[i]}</span>
    </div>`).join('');
}
function bRing(tasks){
  const tot=tasks.length,dn=tasks.filter(t=>t.status==='concluida').length,pct=tot?Math.round(dn/tot*100):0;
  const fg=document.getElementById('rfg');
  if(fg){fg.style.strokeDashoffset=220-(220*pct/100);fg.style.stroke=accHex();}
  const lb=document.getElementById('rpct');if(lb)lb.textContent=pct+'%';
}
function bRec(tasks){
  const r=[...tasks].sort((a,b)=>(b.createdAt||0)-(a.createdAt||0)).slice(0,4);
  const rlist=document.getElementById('rlist');
  if(rlist) rlist.innerHTML=r.map(t=>tHTML(t)).join('');
}
function bTL(tasks){
  const ev=[...tasks.filter(t=>t.status==='concluida').map(t=>({...t,_:'done'})),...tasks.filter(t=>t.status==='em_progresso').map(t=>({...t,_:'prog'}))].slice(0,5);
  const ic={done:{bg:'rgba(34,214,160,.14)',c:'var(--grn)',i:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m9 12 2 2 4-4"/></svg>`},prog:{bg:'var(--as)',c:'var(--a)',i:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`}};
  const tllist=document.getElementById('tllist');
  if(tllist) tllist.innerHTML=ev.map(t=>`<div class="tli"><div class="tld" style="background:${ic[t._].bg};color:${ic[t._].c}">${ic[t._].i}</div><div class="tlinf"><div class="tltt">${t.title}</div><div class="tltm">${SL[t.status]} · ${ago(t.createdAt)}</div></div></div>`).join('');
}
function ago(ts){if(!ts)return'agora';const d=(Date.now()-ts)/1e3;if(d<60)return'agora';if(d<3600)return Math.floor(d/60)+'min';if(d<86400)return Math.floor(d/3600)+'h';return Math.floor(d/86400)+'d';}
function swC(t){CT=t;document.getElementById('ctb').classList.toggle('on',t==='bar');document.getElementById('ctl').classList.toggle('on',t==='line');bMC(gt());}

function renderT(tasks){
  let f=tasks;
  if(F!=='all')f=f.filter(t=>t.status===F);
  if(CAT)f=f.filter(t=>t.category===CAT);
  if(SQ)f=f.filter(t=>t.title.toLowerCase().includes(SQ)||(t.description||'').toLowerCase().includes(SQ));
  const tcnt=document.getElementById('tcnt');
  if(tcnt) tcnt.textContent=`${f.length} tarefa${f.length!==1?'s':''}`;
  const tarea=document.getElementById('tarea');
  if(!tarea)return;
  if(TV==='list'){tarea.innerHTML=`<div class="tlist">${f.map(t=>tHTML(t)).join('')}</div>`;}
  else{tarea.innerHTML=`<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:9px">${f.map(t=>tcHTML(t)).join('')}</div>`;}
}
function tHTML(t){
  const dn=t.status==='concluida';
  return`<div class="ti ${dn?'done':''}" onclick="openD('${t.id}')">
    <div class="chk ${dn?'on':''}" onclick="togD(event,'${t.id}','${t.status}')">${dn?`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="m9 12 2 2 4-4"/></svg>`:''}</div>
    <div class="tin">
      <div class="ttt">${t.title}</div>
      <div class="tm">
        <span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>${t.dueDate||'—'}</span>
        <span class="cat cat-${t.category}">${CL[t.category]||t.category}</span>
      </div>
      ${(t.progress||0)>0&&!dn?`<div class="pbar"><div class="pfill" style="width:${t.progress}%"></div></div>`:''}
    </div>
    <div class="tr">
      <span class="sta sta-${t.status}">${SL[t.status]}</span>
      <div class="pdot pdot-${t.priority}"></div>
    </div>
  </div>`;
}
function tcHTML(t){return`<div class="card" style="cursor:pointer" onclick="openD('${t.id}')"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:7px"><span class="cat cat-${t.category}">${CL[t.category]}</span><div class="pdot pdot-${t.priority}"></div></div><div style="font-size:11px;font-weight:500;margin-bottom:5px">${t.title}</div><div style="font-size:10px;color:var(--t3);margin-bottom:9px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">${t.description||'Sem descrição'}</div><div class="pbar"><div class="pfill" style="width:${t.progress||0}%"></div></div><div style="display:flex;align-items:center;justify-content:space-between;margin-top:8px"><span class="sta sta-${t.status}">${SL[t.status]}</span><span style="font-size:9px;color:var(--t3)">${t.dueDate||'—'}</span></div></div>`;}
function setF(f,btn){F=f;document.querySelectorAll('#frow .fb').forEach(b=>b.classList.remove('on'));btn.classList.add('on');renderT(gt());}
function filterCat(c){CAT=c;setView('tasks');}
function setTV(v){TV=v;document.getElementById('vt-l').classList.toggle('on',v==='list');document.getElementById('vt-g').classList.toggle('on',v==='grid');renderT(gt());}
function onSearch(){SQ=document.getElementById('sinput').value.toLowerCase();if(V==='tasks')renderT(gt());}

function renderK(tasks){
  const cols=[{k:'pendente',l:'Pendente',c:'var(--t2)'},{k:'em_progresso',l:'Em Progresso',c:'var(--a)'},{k:'concluida',l:'Concluída',c:'var(--grn)'}];
  const kb=document.getElementById('kboard');
  if(!kb)return;
  kb.innerHTML=cols.map(col=>{
    const it=tasks.filter(t=>t.status===col.k);
    return`<div class="kcol"><div class="kch"><span class="kct" style="color:${col.c}">${col.l}</span><span class="kcn">${it.length}</span></div><div class="kcards">${it.map(t=>`<div class="kcard" onclick="openD('${t.id}')"><div class="kct2">${t.title}</div><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px"><span class="cat cat-${t.category}">${CL[t.category]}</span><div class="pdot pdot-${t.priority}"></div></div><div class="pbar"><div class="pfill" style="width:${t.progress||0}%"></div></div><div style="font-size:9px;color:var(--t3);margin-top:4px">${t.dueDate||'—'}</div></div>`).join('')}</div></div>`;
  }).join('');
}

function openD(id){
  const t=gt().find(t=>t.id===id);if(!t)return;
  const p=document.getElementById('det');p.classList.add('op');
  document.getElementById('dbody').innerHTML=`
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:7px;margin:9px 0">
      <div class="dttl">${t.title}</div>
      <button class="ddel" onclick="delT('${t.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>Excluir</button>
    </div>
    <div style="font-size:11px;color:var(--t2);line-height:1.6;margin-bottom:13px">${t.description||'Sem descrição'}</div>
    <div><div class="dl">Status</div><div class="dprow">${['pendente','em_progresso','concluida'].map(s=>`<button class="dp ${t.status===s?'on':''}" onclick="updS('${t.id}','${s}')">${SL[s]}</button>`).join('')}</div></div>
    <div style="margin-top:11px"><div class="dl">Prioridade</div><div class="dprow">${['baixa','media','alta'].map(pr=>`<button class="dp ${t.priority===pr?'on':''}" onclick="updP('${t.id}','${pr}')">${PL[pr]}</button>`).join('')}</div></div>
    <div style="margin-top:11px"><div class="dl">Progresso — <span id="dpct">${t.progress||0}</span>%</div>
      <div class="dsli"><input type="range" min="0" max="100" value="${t.progress||0}" oninput="updPg('${t.id}',this.value,this)"><span id="dpsp">${t.progress||0}%</span></div>
      <div class="pbar" style="margin-top:6px;height:5px"><div class="pfill" id="dpbar" style="width:${t.progress||0}%"></div></div>
    </div>
    <div style="margin-top:13px;border-top:1px solid var(--bd);padding-top:13px">
      <div class="dl">Info</div>
      <div class="dir"><span>Categoria</span><span class="cat cat-${t.category}">${CLF[t.category]}</span></div>
      <div class="dir"><span>Entrega</span><span>${t.dueDate||'—'}</span></div>
      <div class="dir"><span>Criada</span><span>${ago(t.createdAt)}</span></div>
      <div class="dir"><span>Status</span><span class="sta sta-${t.status}">${SL[t.status]}</span></div>
    </div>`;
}
function closeD(){document.getElementById('det').classList.remove('op');}
function togD(e,id,st){e.stopPropagation();const ns=st==='concluida'?'pendente':'concluida';window._updateTask(id,{status:ns,progress:ns==='concluida'?100:0});}
function updS(id,s){window._updateTask(id,{status:s,progress:s==='concluida'?100:undefined});openD(id);}
function updP(id,pr){window._updateTask(id,{priority:pr});openD(id);}
function updPg(id,v,el){
  const pv=parseInt(v);
  window._updateTask(id,{progress:pv});
  const b=document.getElementById('dpbar');if(b)b.style.width=pv+'%';
  const s=document.getElementById('dpsp');if(s)s.textContent=pv+'%';
  const c=document.getElementById('dpct');if(c)c.textContent=pv;
}
function delT(id){if(confirm('Excluir esta tarefa?')){window._deleteTask(id);closeD();}}

function openM(){document.getElementById('ov').classList.add('op');document.getElementById('ft').focus();}
function closeM(){document.getElementById('ov').classList.remove('op');['ft','fd','fst','fdu'].forEach(i=>document.getElementById(i).value='');}
function closeOv(e){if(e.target.id==='ov')closeM();}
function subT(){
  const title=document.getElementById('ft').value.trim();if(!title){document.getElementById('ft').focus();return;}
  window._addTask({title,description:document.getElementById('fd').value,category:document.getElementById('fc').value,priority:document.getElementById('fp').value,status:'pendente',dueDate:document.getElementById('fdu').value});
  closeM();
}

function setView(v){
  V=v;CAT=null;
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('act'));
  document.getElementById('view-'+v).classList.add('act');
  document.querySelectorAll('.ni').forEach(n=>n.classList.remove('on'));
  const n=document.getElementById('nav-'+v);if(n)n.classList.add('on');
  const T={dashboard:'Dashboard',tasks:'Tarefas',kanban:'Kanban'};
  document.getElementById('ptitle').textContent=T[v]||v;
  closeD();
  const c=document.getElementById('content');c.classList.remove('fade');void c.offsetWidth;c.classList.add('fade');
  renderV(gt());
}
</script>
</body>
</html>
