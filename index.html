<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Isaac & Kaliny</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
  import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";
  const firebaseConfig = {
    apiKey: "AIzaSyCfmTmB3VgB2dLo_9ASR8eXj7u0ZuMQ_So",
    authDomain: "isaac-e-kaliny.firebaseapp.com",
    projectId: "isaac-e-kaliny",
    storageBucket: "isaac-e-kaliny.firebasestorage.app",
    messagingSenderId: "734318052808",
    appId: "1:734318052808:web:6850d7b2d632e7333c2cfd",
    databaseURL: "https://isaac-e-kaliny-default-rtdb.firebaseio.com"
  };
  let allTasks = [], allFixed = [];
  function fireDemo() {
    allFixed = [
      {id:'f1',title:'Academia',days:[1,2,3,4,5],active:true},
      {id:'f2',title:'Vitaminas da manhã',days:[0,1,2,3,4,5,6],active:true},
      {id:'f3',title:'Reunião de equipe',days:[1,3],active:false},
    ];
    allTasks = [
      {id:'t1',title:'Comprar frutas',type:'day',done:false,createdAt:Date.now()-7200000},
      {id:'t2',title:'Ligar para o banco',type:'day',done:true,createdAt:Date.now()-18000000},
      {id:'t3',title:'Revisar proposta',type:'day',done:false,createdAt:Date.now()-3600000},
    ];
    window._addTask = t => { allTasks.push({...t,id:'d'+Date.now(),createdAt:Date.now()}); fu(); };
    window._toggleTask = id => { const t=allTasks.find(x=>x.id===id); if(t) t.done=!t.done; fu(); };
    window._deleteTask = id => { allTasks=allTasks.filter(t=>t.id!==id); fu(); };
    window._addFixed = f => { allFixed.push({...f,id:'f'+Date.now()}); fu(); };
    window._toggleFixed = id => { const f=allFixed.find(x=>x.id===id); if(f) f.active=!f.active; fu(); };
    window._deleteFixed = id => { allFixed=allFixed.filter(f=>f.id!==id); fu(); };
    fu();
  }
  function fu() { if(window._onDataUpdate) window._onDataUpdate(allTasks,allFixed); }
  try {
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const tRef = ref(db,'tasks_v2'), fRef = ref(db,'fixed_v2');
    onValue(tRef, snap => { allTasks=[]; snap.forEach(c=>allTasks.push({id:c.key,...c.val()})); fu(); });
    onValue(fRef, snap => { allFixed=[]; snap.forEach(c=>allFixed.push({id:c.key,...c.val()})); fu(); }, ()=>fireDemo());
    window._addTask = t => push(tRef,{...t,createdAt:Date.now()});
    window._toggleTask = (id,done) => update(ref(db,'tasks_v2/'+id),{done:!done});
    window._deleteTask = id => remove(ref(db,'tasks_v2/'+id));
    window._addFixed = f => push(fRef,f);
    window._toggleFixed = (id,active) => update(ref(db,'fixed_v2/'+id),{active:!active});
    window._deleteFixed = id => remove(ref(db,'fixed_v2/'+id));
  } catch(e) { fireDemo(); }
  window._getTasks = () => allTasks;
  window._getFixed = () => allFixed;
</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --bg:#f7f5f2;--bg2:#edeae6;--bg3:#e0dbd4;
  --sf:#fff;--sf2:#faf9f7;
  --bd:rgba(0,0,0,.08);--bd2:rgba(0,0,0,.13);
  --t:#0d0d0d;--t2:#5c5c5c;--t3:#aaa;
  --ac:#0d0d0d;--acl:rgba(13,13,13,.06);
  --dl:rgba(0,0,0,.3);--cbg:#0d0d0d;--cc:#fff;
  --sh:0 1px 4px rgba(0,0,0,.07),0 6px 20px rgba(0,0,0,.05);
}
[data-theme="dark"]{
  --bg:#0a0a0a;--bg2:#111;--bg3:#181818;
  --sf:#161616;--sf2:#1c1c1c;
  --bd:rgba(255,255,255,.07);--bd2:rgba(255,255,255,.12);
  --t:#f0ede8;--t2:#777;--t3:#444;
  --ac:#f0ede8;--acl:rgba(240,237,232,.05);
  --dl:rgba(255,255,255,.25);--cbg:#f0ede8;--cc:#0a0a0a;
  --sh:0 1px 4px rgba(0,0,0,.5),0 6px 20px rgba(0,0,0,.35);
}
[data-theme="rose-dark"]{
  --bg:#0c0709;--bg2:#160c10;--bg3:#1e1016;
  --sf:#1c0d13;--sf2:#211018;
  --bd:rgba(255,80,120,.09);--bd2:rgba(255,80,120,.18);
  --t:#fce8ef;--t2:#b86880;--t3:#6a3848;
  --ac:#ff4d7a;--acl:rgba(255,77,122,.09);
  --dl:rgba(255,77,122,.35);--cbg:#ff4d7a;--cc:#fff;
  --sh:0 1px 4px rgba(0,0,0,.6),0 6px 20px rgba(255,77,122,.07);
}
[data-theme="rose-light"]{
  --bg:#fff5f7;--bg2:#ffe6ed;--bg3:#ffd0db;
  --sf:#fff;--sf2:#fff8fa;
  --bd:rgba(255,77,122,.11);--bd2:rgba(255,77,122,.2);
  --t:#280810;--t2:#9c2e4a;--t3:#d090a8;
  --ac:#ff4d7a;--acl:rgba(255,77,122,.07);
  --dl:rgba(255,77,122,.45);--cbg:#ff4d7a;--cc:#fff;
  --sh:0 1px 4px rgba(255,77,122,.07),0 6px 20px rgba(255,77,122,.05);
}

html,body{height:100%;background:var(--bg);color:var(--t);font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.5;transition:background .35s,color .35s;overflow:hidden;}

.app{display:flex;height:100dvh;}

/* ── SIDEBAR ── */
.sidebar{
  width:220px;background:var(--sf);border-right:1px solid var(--bd);
  display:flex;flex-direction:column;padding:22px 14px;
  transition:width .26s cubic-bezier(.4,0,.2,1),padding .26s,background .35s,border .35s;
  overflow:hidden;flex-shrink:0;z-index:10;
}
.sidebar.col{width:54px;padding:22px 8px;}

.sb-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-bottom:18px;border-bottom:1px solid var(--bd);transition:border .35s;}
.sb-brand{overflow:hidden;white-space:nowrap;}
.sb-brand small{display:block;font-size:8px;font-weight:400;letter-spacing:2.5px;text-transform:uppercase;color:var(--t3);margin-bottom:2px;opacity:1;transition:opacity .15s;}
.sb-brand strong{font-family:'Playfair Display',serif;font-size:15px;font-weight:500;color:var(--t);opacity:1;transition:opacity .15s;}
.sidebar.col .sb-brand{opacity:0;pointer-events:none;}

.sb-tog{background:none;border:none;cursor:pointer;color:var(--t3);padding:4px;border-radius:6px;transition:color .15s,background .15s;flex-shrink:0;display:flex;align-items:center;}
.sb-tog:hover{color:var(--t2);background:var(--acl);}
.sb-tog svg{width:14px;height:14px;transition:transform .26s;}
.sidebar.col .sb-tog svg{transform:rotate(180deg);}

.nav-item{
  display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;
  cursor:pointer;font-size:12px;font-weight:400;color:var(--t2);
  transition:all .15s;margin-bottom:2px;white-space:nowrap;overflow:hidden;user-select:none;
  position:relative;
}
.nav-item:hover{background:var(--acl);color:var(--t);}
.nav-item.active{background:var(--acl);color:var(--ac);font-weight:500;}
.nav-item svg{width:15px;height:15px;flex-shrink:0;}
.nav-lbl{opacity:1;transition:opacity .12s .05s;}
.sidebar.col .nav-lbl{opacity:0;}

/* tooltip on collapsed */
.sidebar.col .nav-item::after{
  content:attr(data-tip);position:absolute;left:calc(100% + 10px);top:50%;transform:translateY(-50%);
  background:var(--sf);border:1px solid var(--bd2);color:var(--t);font-size:11px;
  padding:5px 10px;border-radius:7px;white-space:nowrap;pointer-events:none;
  opacity:0;transition:opacity .15s;z-index:200;box-shadow:var(--sh);
}
.sidebar.col .nav-item:hover::after{opacity:1;}

.sb-themes{margin-top:auto;padding-top:14px;border-top:1px solid var(--bd);transition:border .35s;}
.sb-themes-lbl{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--t3);margin-bottom:9px;opacity:1;transition:opacity .12s;white-space:nowrap;}
.sidebar.col .sb-themes-lbl{opacity:0;}
.tdots{display:flex;gap:7px;flex-wrap:wrap;}
.tdot{width:15px;height:15px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .2s,border-color .2s;}
.tdot:hover{transform:scale(1.2);}
.tdot.on{border-color:var(--t2);}
.tdot-w{background:#f7f5f2;box-shadow:0 0 0 1px rgba(0,0,0,.15);}
.tdot-d{background:#0a0a0a;}
.tdot-rd{background:conic-gradient(#0c0709 180deg,#ff4d7a 180deg);}
.tdot-rl{background:conic-gradient(#fff5f7 180deg,#ff4d7a 180deg);box-shadow:0 0 0 1px rgba(255,77,122,.25);}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}

.topbar{
  display:flex;align-items:center;gap:11px;padding:15px 22px;
  border-bottom:1px solid var(--bd);background:var(--sf);flex-shrink:0;
  transition:background .35s,border .35s;
}
.page-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:500;letter-spacing:-.3px;flex:1;}
.date-lbl{font-size:10px;color:var(--t3);white-space:nowrap;}

.top-btn{
  display:flex;align-items:center;gap:5px;padding:7px 13px;border-radius:8px;
  border:1px solid var(--bd2);background:transparent;color:var(--t);
  font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap;
}
.top-btn:hover{background:var(--acl);border-color:var(--ac);color:var(--ac);}
.top-btn svg{width:11px;height:11px;flex-shrink:0;}

/* ── CONTENT ── */
.content{flex:1;overflow-y:auto;padding:22px 20px;}
.content::-webkit-scrollbar{width:2px;}
.content::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px;}

.section{margin-bottom:30px;}
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.sec-title{font-size:9px;font-weight:500;letter-spacing:2.2px;text-transform:uppercase;color:var(--t3);}
.sec-cnt{font-size:9px;color:var(--t3);background:var(--acl);padding:2px 7px;border-radius:20px;}

/* ── TASK ── */
.tlist{display:flex;flex-direction:column;gap:2px;}
.titem{
  display:flex;align-items:center;gap:11px;padding:11px 12px;border-radius:9px;
  border:1px solid transparent;transition:all .15s;
}
.titem:hover{background:var(--acl);border-color:var(--bd);}
.titem.done .tlbl{color:var(--t3);text-decoration:line-through;text-decoration-color:var(--dl);}

.chk{
  width:18px;height:18px;min-width:18px;border:1.5px solid var(--bd2);border-radius:5px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;flex-shrink:0;
}
.chk:hover{border-color:var(--ac);}
.chk.on{background:var(--cbg);border-color:var(--cbg);}
.chk.on svg{display:block;}
.chk svg{display:none;width:9px;height:9px;stroke:var(--cc);}

.tlbl{flex:1;font-size:13px;color:var(--t);line-height:1.4;transition:color .15s;}
.tdel{
  opacity:0;background:none;border:none;cursor:pointer;color:var(--t3);
  padding:3px;border-radius:4px;transition:all .15s;display:flex;align-items:center;flex-shrink:0;
}
.tdel:hover{color:#e53935;}
.tdel svg{width:11px;height:11px;}
.titem:hover .tdel{opacity:1;}

/* ── FIXED ITEM ── */
.fitem{
  display:flex;align-items:center;gap:9px;padding:11px 12px;border-radius:9px;
  border:1px solid var(--bd);background:var(--sf2);margin-bottom:4px;transition:all .15s;
}
.fitem:hover{border-color:var(--bd2);}
.fitem.off .tlbl{color:var(--t3);}
.dchips{display:flex;gap:3px;flex-shrink:0;}
.dchip{
  width:18px;height:18px;border-radius:5px;background:var(--bg2);border:1px solid var(--bd);
  font-size:8px;font-weight:600;display:flex;align-items:center;justify-content:center;color:var(--t3);
}
.dchip.on{background:var(--ac);border-color:var(--ac);color:var(--cc);}

.pill{
  width:27px;height:14px;border-radius:20px;background:var(--bg3);border:1px solid var(--bd2);
  cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;
}
.pill::after{content:'';width:8px;height:8px;border-radius:50%;background:var(--t3);position:absolute;top:2px;left:2px;transition:all .2s;}
.pill.on{background:var(--acl);border-color:var(--ac);}
.pill.on::after{left:15px;background:var(--ac);}

.fdel{
  opacity:0;background:none;border:none;cursor:pointer;color:var(--t3);
  padding:3px;border-radius:4px;transition:all .15s;display:flex;align-items:center;flex-shrink:0;
}
.fdel:hover{color:#e53935;}
.fdel svg{width:11px;height:11px;}
.fitem:hover .fdel{opacity:1;}

/* ── QUICK ADD ── */
.qadd{
  display:flex;align-items:center;gap:8px;padding:10px 12px;
  border:1px dashed var(--bd2);border-radius:9px;cursor:text;color:var(--t3);font-size:12px;
  margin-top:4px;transition:all .15s;
}
.qadd:hover{border-color:var(--ac);color:var(--t);}
.qadd svg{width:11px;height:11px;flex-shrink:0;}

.sdone-btn{
  display:flex;align-items:center;gap:6px;font-size:10px;color:var(--t3);
  cursor:pointer;padding:4px 0;background:none;border:none;
  font-family:'DM Sans',sans-serif;transition:color .15s;
}
.sdone-btn:hover{color:var(--t2);}
.sdone-btn svg{width:11px;height:11px;transition:transform .2s;}
.sdone-btn.open svg{transform:rotate(180deg);}
.empty{padding:18px 12px;text-align:center;color:var(--t3);font-size:12px;}

/* ── BOTTOM NAV (mobile) ── */
.bnav{
  display:none;background:var(--sf);border-top:1px solid var(--bd);
  padding:8px 0 max(8px,env(safe-area-inset-bottom));flex-shrink:0;
  transition:background .35s,border .35s;
}
.bnav-inner{display:flex;justify-content:space-around;}
.bni{
  display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 22px;
  border-radius:10px;cursor:pointer;color:var(--t3);transition:all .15s;
  border:none;background:none;font-family:'DM Sans',sans-serif;
}
.bni.active{color:var(--ac);}
.bni svg{width:18px;height:18px;}
.bni-lbl{font-size:9px;font-weight:500;}

/* FAB */
.fab{
  display:none;position:fixed;right:18px;
  bottom:calc(68px + env(safe-area-inset-bottom));
  width:48px;height:48px;border-radius:50%;
  background:var(--ac);border:none;cursor:pointer;
  align-items:center;justify-content:center;
  box-shadow:0 4px 18px rgba(0,0,0,.22);z-index:30;
  transition:background .35s,transform .15s;
}
.fab:active{transform:scale(.93);}
.fab svg{width:18px;height:18px;stroke:var(--cc);}

/* ── MODAL / SHEET ── */
.ov{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.52);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  z-index:200;align-items:flex-end;justify-content:center;
}
.ov.open{display:flex;}
.modal{
  background:var(--sf);border:1px solid var(--bd2);
  border-radius:18px 18px 0 0;
  padding:20px 20px max(20px,env(safe-area-inset-bottom));
  width:100%;max-width:480px;
  animation:shIn .22s cubic-bezier(.32,0,.67,0);
  box-shadow:var(--sh);max-height:92dvh;overflow-y:auto;
}
@keyframes shIn{from{transform:translateY(50px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.mhandle{width:34px;height:3px;border-radius:3px;background:var(--bd2);margin:0 auto 16px;}
.mtitle{font-family:'Playfair Display',serif;font-size:17px;font-weight:500;margin-bottom:16px;color:var(--t);}
.field{margin-bottom:12px;}
.field label{display:block;font-size:8px;font-weight:500;letter-spacing:1.8px;text-transform:uppercase;color:var(--t3);margin-bottom:5px;}
.field input,.field select{
  width:100%;padding:10px 11px;background:var(--bg2);border:1px solid var(--bd);
  border-radius:9px;color:var(--t);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:border .15s;
}
.field input:focus,.field select:focus{border-color:var(--ac);}
.field input::placeholder{color:var(--t3);}
.field select option{background:var(--sf);}

.dsel{display:flex;gap:5px;}
.dbtn{
  flex:1;height:36px;border-radius:8px;border:1px solid var(--bd2);background:transparent;
  color:var(--t2);font-family:'DM Sans',sans-serif;font-size:10px;font-weight:500;cursor:pointer;transition:all .15s;
}
.dbtn.on{background:var(--ac);border-color:var(--ac);color:var(--cc);}
.dbtn:hover:not(.on){border-color:var(--ac);color:var(--ac);}

.presets{display:flex;gap:5px;margin-bottom:9px;flex-wrap:wrap;}
.pbtn{
  padding:5px 10px;border-radius:20px;border:1px solid var(--bd2);background:transparent;
  color:var(--t2);font-size:10px;cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif;
}
.pbtn:hover{border-color:var(--ac);color:var(--ac);}

.macts{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;}
.mcancel{
  padding:9px 16px;border-radius:8px;border:1px solid var(--bd2);background:transparent;
  color:var(--t2);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;transition:all .15s;
}
.mcancel:hover{background:var(--acl);}
.msave{
  padding:9px 22px;border-radius:8px;border:none;background:var(--ac);color:var(--cc);
  font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:opacity .15s;
}
.msave:hover{opacity:.85;}

/* theme sheet opts */
.th-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:6px;}
.thopt{
  padding:12px;border-radius:10px;border:1px solid var(--bd2);background:var(--bg2);
  color:var(--t);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;transition:all .15s;text-align:left;
}
.thopt:hover{border-color:var(--ac);}
.thopt.on{border-color:var(--ac);background:var(--acl);color:var(--ac);}

.view{display:none;}
.view.active{display:block;animation:fadeUp .2s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}

/* ── RESPONSIVE ── */
@media(max-width:640px){
  .sidebar{display:none!important;}
  .bnav{display:block;}
  .fab{display:flex;}
  .topbar{padding:13px 15px;}
  .topbar .top-btn,.topbar .date-lbl{display:none;}
  .content{padding:16px 14px 90px;}
  .page-title{font-size:17px;}
}
@media(min-width:641px){
  .ov{align-items:center;}
  .modal{border-radius:16px;padding:24px;max-height:85vh;}
  .mhandle{display:none;}
}
</style>
</head>
<body>
<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sb">
    <div class="sb-top">
      <div class="sb-brand">
        <small>lista de</small>
        <strong>Isaac & Kaliny</strong>
      </div>
      <button class="sb-tog" onclick="toggleSB()" title="Recolher sidebar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
    </div>

    <div class="nav-item active" id="nav-hoje" data-tip="Hoje" onclick="setView('hoje',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <span class="nav-lbl">Hoje</span>
    </div>
    <div class="nav-item" id="nav-fixas" data-tip="Tarefas Fixas" onclick="setView('fixas',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      <span class="nav-lbl">Tarefas Fixas</span>
    </div>

    <div class="sb-themes">
      <div class="sb-themes-lbl">Tema</div>
      <div class="tdots">
        <div class="tdot tdot-w on" onclick="setTheme('',this,'w')" title="Branco"></div>
        <div class="tdot tdot-d"  onclick="setTheme('dark',this,'d')" title="Preto"></div>
        <div class="tdot tdot-rd" onclick="setTheme('rose-dark',this,'rd')" title="Rosa escuro"></div>
        <div class="tdot tdot-rl" onclick="setTheme('rose-light',this,'rl')" title="Rosa claro"></div>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div class="page-title" id="ptitle">Hoje</div>
      <span class="date-lbl" id="dlbl"></span>
      <button class="top-btn" id="tbtn" onclick="openModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Nova tarefa
      </button>
    </div>

    <div class="content" id="cnt">
      <div class="view active" id="view-hoje">
        <div id="s-fixas"></div>
        <div id="s-day"></div>
        <div id="s-done"></div>
      </div>
      <div class="view" id="view-fixas">
        <div class="section">
          <div class="sec-hd">
            <span class="sec-title">Tarefas Fixas</span>
            <button class="top-btn" onclick="openFixedModal()" style="font-size:10px;padding:5px 10px;">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              Nova fixa
            </button>
          </div>
          <div id="flist"></div>
        </div>
      </div>
    </div>

    <!-- BOTTOM NAV mobile -->
    <nav class="bnav">
      <div class="bnav-inner">
        <button class="bni active" id="bni-hoje" onclick="setView('hoje',null,'hoje')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          <span class="bni-lbl">Hoje</span>
        </button>
        <button class="bni" id="bni-fixas" onclick="setView('fixas',null,'fixas')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          <span class="bni-lbl">Fixas</span>
        </button>
        <button class="bni" onclick="openThemeSheet()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
          <span class="bni-lbl">Tema</span>
        </button>
      </div>
    </nav>
  </div>
</div>

<!-- FAB -->
<button class="fab" id="fab" onclick="onFab()">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
</button>

<!-- MODAL: DAY TASK -->
<div class="ov" id="m-day" onclick="ooc(event,'m-day')">
  <div class="modal">
    <div class="mhandle"></div>
    <div class="mtitle">Nova tarefa do dia</div>
    <div class="field">
      <label>O que precisa fazer?</label>
      <input type="text" id="day-in" placeholder="ex: Comprar pão..." onkeydown="if(event.key==='Enter')saveDay()">
    </div>
    <div class="macts">
      <button class="mcancel" onclick="cm('m-day')">Cancelar</button>
      <button class="msave" onclick="saveDay()">Salvar</button>
    </div>
  </div>
</div>

<!-- MODAL: FIXED TASK -->
<div class="ov" id="m-fixed" onclick="ooc(event,'m-fixed')">
  <div class="modal">
    <div class="mhandle"></div>
    <div class="mtitle">Nova tarefa fixa</div>
    <div class="field">
      <label>Nome da tarefa</label>
      <input type="text" id="fix-in" placeholder="ex: Academia...">
    </div>
    <div class="field">
      <label>Dias da semana</label>
      <div class="presets">
        <button class="pbtn" onclick="setPreset([0,1,2,3,4,5,6])">Todo dia</button>
        <button class="pbtn" onclick="setPreset([1,2,3,4,5])">Seg–Sex</button>
        <button class="pbtn" onclick="setPreset([1,3,5])">Seg, Qua, Sex</button>
        <button class="pbtn" onclick="setPreset([0,6])">Fim de semana</button>
      </div>
      <div class="dsel" id="dsel">
        <button class="dbtn" data-d="0">D</button>
        <button class="dbtn" data-d="1">S</button>
        <button class="dbtn" data-d="2">T</button>
        <button class="dbtn" data-d="3">Q</button>
        <button class="dbtn" data-d="4">Q</button>
        <button class="dbtn" data-d="5">S</button>
        <button class="dbtn" data-d="6">S</button>
      </div>
    </div>
    <div class="macts">
      <button class="mcancel" onclick="cm('m-fixed')">Cancelar</button>
      <button class="msave" onclick="saveFixed()">Salvar</button>
    </div>
  </div>
</div>

<!-- MODAL: THEME (mobile) -->
<div class="ov" id="m-theme" onclick="ooc(event,'m-theme')">
  <div class="modal">
    <div class="mhandle"></div>
    <div class="mtitle">Escolher tema</div>
    <div class="th-grid">
      <button class="thopt on" id="th-w"  onclick="setTheme('',null,'w')">☀️ Branco</button>
      <button class="thopt"    id="th-d"  onclick="setTheme('dark',null,'d')">🌑 Preto</button>
      <button class="thopt"    id="th-rd" onclick="setTheme('rose-dark',null,'rd')">🌹 Rosa escuro</button>
      <button class="thopt"    id="th-rl" onclick="setTheme('rose-light',null,'rl')">🌸 Rosa claro</button>
    </div>
    <div class="macts"><button class="mcancel" onclick="cm('m-theme')">Fechar</button></div>
  </div>
</div>

<script>
const DN=['D','S','T','Q','Q','S','S'];
const DF=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const MN=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
let V='hoje', showDone=false, selDays=[], sbCol=false;

document.addEventListener('DOMContentLoaded',()=>{
  const now=new Date();
  document.getElementById('dlbl').textContent=DF[now.getDay()]+', '+now.getDate()+' de '+MN[now.getMonth()];
  document.querySelectorAll('.dbtn').forEach(b=>b.addEventListener('click',()=>{
    const d=parseInt(b.dataset.d);
    selDays.includes(d)?(selDays=selDays.filter(x=>x!==d),b.classList.remove('on')):(selDays.push(d),b.classList.add('on'));
  }));
});

window._onDataUpdate=(tasks,fixed)=>{renderHoje(tasks,fixed);renderFixed(fixed);};
const gd=()=>({tasks:window._getTasks?window._getTasks():[],fixed:window._getFixed?window._getFixed():[]});

function renderHoje(tasks,fixed){
  if(V!=='hoje')return;
  const td=new Date().getDay();

  // Fixas de hoje
  const tf=(fixed||[]).filter(f=>(f.days||[]).includes(td));
  const sF=document.getElementById('s-fixas');
  if(sF) sF.innerHTML=tf.length?`
    <div class="section">
      <div class="sec-hd"><span class="sec-title">Fixas de hoje</span><span class="sec-cnt">${tf.length}</span></div>
      <div class="tlist">${tf.map(f=>`
        <div class="titem ${!f.active?'done':''}">
          <div class="chk ${!f.active?'on':''}" onclick="window._toggleFixed&&window._toggleFixed('${f.id}')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="m9 12 2 2 4-4"/></svg>
          </div>
          <span class="tlbl">${f.title}</span>
        </div>`).join('')}
      </div>
    </div>`:'';

  // Do dia
  const dt=(tasks||[]).filter(t=>t.type==='day'&&!t.done);
  const sD=document.getElementById('s-day');
  if(sD) sD.innerHTML=`
    <div class="section">
      <div class="sec-hd"><span class="sec-title">Do dia</span><span class="sec-cnt">${dt.length}</span></div>
      <div class="tlist">
        ${dt.length===0?'<div class="empty">Tudo limpo por aqui ✓</div>':dt.map(tHTML).join('')}
      </div>
      <div class="qadd" onclick="openModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Adicionar tarefa...
      </div>
    </div>`;

  // Concluídas
  const dn=(tasks||[]).filter(t=>t.done);
  const sDn=document.getElementById('s-done');
  if(sDn) sDn.innerHTML=dn.length?`
    <div class="section">
      <button class="sdone-btn ${showDone?'open':''}" onclick="togDone()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        ${dn.length} concluída${dn.length!==1?'s':''}
      </button>
      ${showDone?`<div class="tlist" style="margin-top:8px">${dn.map(tHTML).join('')}</div>`:''}
    </div>`:'';
}

function tHTML(t){return`
  <div class="titem ${t.done?'done':''}">
    <div class="chk ${t.done?'on':''}" onclick="window._toggleTask&&window._toggleTask('${t.id}',${!!t.done})">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="m9 12 2 2 4-4"/></svg>
    </div>
    <span class="tlbl">${t.title}</span>
    <button class="tdel" onclick="window._deleteTask&&window._deleteTask('${t.id}')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>
  </div>`;}

function renderFixed(fixed){
  if(V!=='fixas')return;
  const el=document.getElementById('flist');if(!el)return;
  if(!fixed||!fixed.length){el.innerHTML='<div class="empty">Sem tarefas fixas ainda ✦</div>';return;}
  el.innerHTML=fixed.map(f=>{
    const chips=[0,1,2,3,4,5,6].map(d=>`<div class="dchip ${(f.days||[]).includes(d)?'on':''}">${DN[d]}</div>`).join('');
    return`<div class="fitem ${!f.active?'off':''}">
      <span class="tlbl" style="flex:1;min-width:0;">${f.title}</span>
      <div class="dchips">${chips}</div>
      <div class="pill ${f.active?'on':''}" onclick="window._toggleFixed&&window._toggleFixed('${f.id}')"></div>
      <button class="fdel" onclick="delF('${f.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
    </div>`;
  }).join('');
}

function delF(id){if(confirm('Remover tarefa fixa?'))window._deleteFixed&&window._deleteFixed(id);}
function togDone(){showDone=!showDone;const d=gd();renderHoje(d.tasks,d.fixed);}

function setView(v,sEl,bk){
  V=v;
  document.querySelectorAll('.view').forEach(e=>e.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  if(sEl)sEl.classList.add('active');
  else{const n=document.getElementById('nav-'+v);if(n)n.classList.add('active');}
  document.querySelectorAll('.bni').forEach(b=>b.classList.remove('active'));
  const bn=document.getElementById('bni-'+(bk||v));if(bn)bn.classList.add('active');
  const titles={hoje:'Hoje',fixas:'Tarefas Fixas'};
  document.getElementById('ptitle').textContent=titles[v]||v;
  const tb=document.getElementById('tbtn');
  if(v==='fixas'){
    tb.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:11px;height:11px"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Nova fixa';
    tb.onclick=openFixedModal;
  }else{
    tb.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:11px;height:11px"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Nova tarefa';
    tb.onclick=openModal;
  }
  const d=gd();
  if(v==='hoje')renderHoje(d.tasks,d.fixed);
  if(v==='fixas')renderFixed(d.fixed);
}

function toggleSB(){sbCol=!sbCol;document.getElementById('sb').classList.toggle('col',sbCol);}
function onFab(){V==='fixas'?openFixedModal():openModal();}

function openModal(){document.getElementById('m-day').classList.add('open');setTimeout(()=>document.getElementById('day-in').focus(),80);}
function openFixedModal(){selDays=[];document.querySelectorAll('.dbtn').forEach(b=>b.classList.remove('on'));document.getElementById('fix-in').value='';document.getElementById('m-fixed').classList.add('open');setTimeout(()=>document.getElementById('fix-in').focus(),80);}
function openThemeSheet(){document.getElementById('m-theme').classList.add('open');}
function cm(id){document.getElementById(id).classList.remove('open');}
function ooc(e,id){if(e.target.id===id)cm(id);}

function saveDay(){
  const v=document.getElementById('day-in').value.trim();
  if(!v){document.getElementById('day-in').focus();return;}
  window._addTask&&window._addTask({title:v,type:'day',done:false});
  document.getElementById('day-in').value='';
  cm('m-day');
}
function saveFixed(){
  const v=document.getElementById('fix-in').value.trim();
  if(!v){document.getElementById('fix-in').focus();return;}
  if(!selDays.length){alert('Selecione ao menos um dia.');return;}
  window._addFixed&&window._addFixed({title:v,days:selDays,active:true});
  cm('m-fixed');
}
function setPreset(days){
  selDays=[...days];
  document.querySelectorAll('.dbtn').forEach(b=>b.classList.toggle('on',days.includes(parseInt(b.dataset.d))));
}

function setTheme(t,dotEl,key){
  document.documentElement.setAttribute('data-theme',t);
  document.querySelectorAll('.tdot').forEach(d=>d.classList.remove('on'));
  document.querySelectorAll('.thopt').forEach(o=>o.classList.remove('on'));
  if(dotEl)dotEl.classList.add('on');
  if(key){
    const to=document.getElementById('th-'+key);if(to)to.classList.add('on');
    // sync dots
    const dm={'w':'tdot-w','d':'tdot-d','rd':'tdot-rd','rl':'tdot-rl'};
    const dc=document.querySelector('.'+dm[key]);if(dc)dc.classList.add('on');
  }
}
</script>
</body>
</html>
